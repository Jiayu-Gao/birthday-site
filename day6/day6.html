<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>专属兑换券</title>
  <link rel="stylesheet" href="day6.css">
</head>

<body>
  <div class="page">
    <h1>🎟 萌萌专属兑换券 🎟</h1>
    <p class="tip">点击每一张券，解锁你的专属权益</p>

    <div class="coupon-box">

      <div class="coupon-card">
        <div class="coupon-inner">
          <div class="coupon-face coupon-front">
            <img src="coupon-front.png" alt="coupon">
          </div>
          <div class="coupon-face coupon-back">
            <h3>📸 无限次拍照服务券</h3>
            <p>无论出门多少次，都负责帮你拍到满意为止。</p>
          </div>
        </div>
      </div>

      <div class="coupon-card">
        <div class="coupon-inner">
          <div class="coupon-face coupon-front">
            <img src="coupon-front.png" alt="coupon">
          </div>
          <div class="coupon-face coupon-back">
            <h3>🎧 无限次吐槽服务券</h3>
            <p>开心的、不开心的、离谱的，都可以随时来找我吐槽。</p>
          </div>
        </div>
      </div>

      <div class="coupon-card">
        <div class="coupon-inner">
          <div class="coupon-face coupon-front">
            <img src="coupon-front.png" alt="coupon">
          </div>
          <div class="coupon-face coupon-back">
            <h3>🫂 无限次拥抱服务券</h3>
            <p>现场版和线上版都有效，难过的时候也可以使用。</p>
          </div>
        </div>
      </div>

      <div class="coupon-card">
        <div class="coupon-inner">
          <div class="coupon-face coupon-front">
            <img src="coupon-front.png" alt="coupon">
          </div>
          <div class="coupon-face coupon-back">
            <h3>🌤 一整天快乐时光兑换券</h3>
            <p>可兑换一整天属于我们的快乐时间。</p>
          </div>
        </div>
      </div>

      <div class="coupon-card">
        <div class="coupon-inner">
          <div class="coupon-face coupon-front">
            <img src="coupon-front.png" alt="coupon">
          </div>
          <div class="coupon-face coupon-back">
            <h3>📞 超长语音通话券</h3>
            <p>想聊天、想分享、想发疯的时候，都可以使用。</p>
          </div>
        </div>
      </div>

      <div class="coupon-card">
        <div class="coupon-inner">
          <div class="coupon-face coupon-front">
            <img src="coupon-front.png" alt="coupon">
          </div>
          <div class="coupon-face coupon-back">
            <h3>🌈 好运补给券</h3>
            <p>当生活有点糟糕的时候，可强制领取一点好运。</p>
          </div>
        </div>
      </div>

    </div>

    <div id="final-message">
      <div class="final-title">❤️ 已解锁全部专属权益 ❤️</div>
      <div class="final-subtitle">有效期：永久</div>
    </div>
  </div>

  <script src="day6.js"></script>
</body>
</html>
